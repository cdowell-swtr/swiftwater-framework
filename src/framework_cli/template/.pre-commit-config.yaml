# FRAMEWORK:BEGIN — managed by swiftwater-framework; do not edit inside this region.
# Deterministic, fast quality gate that runs on every commit. `framework restore`
# overwrites everything between the markers from the installed template version. Add
# your OWN hooks below the closing marker (see the note there).
default_install_hook_types: [pre-commit, commit-msg]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^\.copier-answers\.yml$
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true
      - id: mypy
        name: mypy
        entry: uv run mypy src
        language: system
        pass_filenames: false
        types: [python]
        require_serial: true
      - id: migrations-reversible
        name: migrations are reversible + backward-compatible (rolling-safe)
        entry: uv run python scripts/check_migrations.py
        language: system
        pass_filenames: false
        files: ^migrations/versions/.*\.py$
      - id: coverage-threshold
        name: unit + functional coverage (>=70%)
        entry: bash scripts/coverage.sh 70 unit functional
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: docs-layout
        name: docs-layout (internal docs structure)
        entry: bash scripts/docs_layout_check.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
# FRAMEWORK:END
# Your project's own pre-commit hooks go below, each as another `- repo:` entry at this
# indent — they continue the `repos:` list above and survive `framework restore`. Example:
#   - repo: https://github.com/astral-sh/uv-pre-commit
#     rev: 0.5.0
#     hooks:
#       - id: uv-lock
