_templates_suffix: .jinja

project_name:
  type: str
  help: Human-readable project name

project_slug:
  type: str
  help: Directory / repository slug
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

package_name:
  type: str
  help: Python package name
  default: "{{ project_slug | lower | replace('-', '_') }}"

python_version:
  type: str
  help: Python version to target
  default: "3.12"

batteries:
  type: yaml
  help: Active batteries (set via `framework new --with`); not prompted.
  default: []

uses_postgres_extension:
  type: bool
  help: "(computed) any battery that installs a Postgres extension is active"
  default: "{{ 'pgvector' in batteries or 'timescaledb' in batteries }}"
  when: false
