_templates_suffix: .jinja

project_name:
  type: str
  help: Human-readable project name

project_slug:
  type: str
  help: Directory / repository slug
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

package_name:
  type: str
  help: Python package name
  default: "{{ project_slug | lower | replace('-', '_') }}"

python_version:
  type: str
  help: Python version to target
  default: "3.12"

pi_prefix:
  type: str
  help: PI task-ID prefix (short uppercase tag, e.g. FWK, MDN)
  default: "{{ (project_slug | upper | replace('-', '') | replace('_', ''))[:4] }}"

batteries:
  type: yaml
  help: Active batteries (set via `framework new --with`); not prompted.
  default: []

alert_channels:
  type: yaml
  help: Active alert channels (set via the wizard / --alerts); not prompted.
  default: ["webhook"]

uses_postgres_extension:
  type: bool
  help: "(computed) any battery that installs a Postgres extension is active"
  default: "{{ 'pgvector' in batteries or 'timescaledb' in batteries or 'age' in batteries }}"
  when: false
