# Per-agent overrides for the eval pass thresholds. Agents omitted here use the defaults
# (recall_min 0.67, fp_max 0.34).
#
# Values are calibrated from docs/superpowers/eval-scorecards/2026-05-30-91383f6/ (the
# inaugural full-sweep /reviewers:tune run, 132 work items × 3 repeats, drift-check clean).
# Calibration policy: recall_min = observed - 0.10, fp_max = observed + 0.10 (margins for
# subagent variance). Comments show the observed value the floor/ceiling was derived from.
#
# Agents NOT listed here (contracts, documentation, observability-infra) use defaults — they
# FAIL the inaugural scorecard for real reasons that need fixing (contracts under-finding;
# documentation + observability-infra "good" fixtures aren't actually clean). Calibrating
# to their current numbers would lock in those issues. Re-calibrate after fixing.

accessibility:
  recall_min: 0.90  # observed 1.00
  fp_max: 0.10  # observed 0.00
