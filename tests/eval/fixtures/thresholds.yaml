# Per-agent overrides for the eval pass thresholds. Agents omitted here use the defaults
# (recall_min 0.67, fp_max 0.34).
#
# Values are calibrated from docs/superpowers/eval-scorecards/2026-05-30-04194be/ (the
# round-3 full-sweep /reviewers:tune run, 132 calls, all 18 agents PASS, drift-check clean).
# Calibration policy: recall_min = observed - 0.10, fp_max = observed + 0.10 (margins for
# subagent variance). Comments show the observed value the floor/ceiling was derived from.
#
# Iteration history (each scorecard is committed under docs/superpowers/eval-scorecards/):
#   91383f6 — inaugural: 15 PASS / 3 FAIL (contracts, documentation, observability-infra)
#   b1ae020 — after path fix + 2 fixture fixes: 15 PASS / 3 FAIL (different agents)
#   04194be — after 3 more fixture redesigns: 18/18 PASS, full coverage
#   36a1b00 — full 20-agent re-sweep (incl. env-parity, observability-fe). Cleaned two good
#             fixtures (performance/single-query → bounded read; test-quality/meaningful-assert
#             → exact+canonical asserts), both re-tuned to 1.00/0.00 at strict bars. Widened
#             advisory dependency/documentation fp_max (surface-by-design) + gave data-lineage/
#             observability-db a recall variance margin. Scorecard 2026-06-03-36a1b00.

#   54e3236+ — PLAN 21 re-tune: Phase-2 retuned 15 agents to the shared rubric; Phase-3
#             --repeat-3 re-sweep + eval-analyze re-derivation (this set). architecture &
#             env-parity wobbles were PROMPT bugs (severity-field omission; fabricated
#             overlay injection), firmed -> 1.00/0.00. Advisory agents (observability-db,
#             documentation, dependency, usability) pinned fp_max 1.00 (never block).
#             compliance + observability-infra LEFT STRICT (their Phase-1 fixes were
#             adversarially REFUTED) -> they FAIL by design = REQUIRES REWORK, not masked.
#             agent-evals CI is opt-in/skip-neutral, so these 2 do not gate merge.

