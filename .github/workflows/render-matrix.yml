name: render-matrix

on:
  pull_request:
  push:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — drift backstop
  workflow_dispatch:
  workflow_call:
    inputs:
      strategy:
        type: string
        required: false

permissions:
  contents: read

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      combos: ${{ steps.gen.outputs.combos }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - id: gen
        env:
          # PR -> fast representative set; everything else -> broad (pairwise + rotation).
          # A workflow_call may override via inputs.strategy.
          STRATEGY: ${{ inputs.strategy || (github.event_name == 'pull_request' && 'representative' || 'broad') }}
          SEED: ${{ github.run_number }}
        run: |
          combos=$(uv run framework dev-combos --strategy "$STRATEGY" --seed "$SEED")
          echo "combos=$combos" >> "$GITHUB_OUTPUT"

  render:
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix:
        combo: ${{ fromJSON(needs.generate-matrix.outputs.combos) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      # `task` (go-task) installed directly (not arduino/setup-task, which has no
      # Node-24 release) — see docs/maintenance/github-actions-node-runtime.md.
      - name: Install Task (go-task)
        run: |
          sh -c "$(curl -sSL https://taskfile.dev/install.sh)" -- -b "$HOME/.local/bin" v3.51.1
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Node (react combos only)
        if: contains(matrix.combo.batteries, 'react')
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: uv sync
      - run: uv tool install .
      - name: render the project (real builder path)
        run: framework new demo ${{ matrix.combo.with_flags }} ${{ matrix.combo.alerts_flag }}
      - run: uv sync
        working-directory: demo
      - run: framework integrity --ci
        working-directory: demo
      - run: task ci
        working-directory: demo
      - name: frontend gate (react combos only)
        if: contains(matrix.combo.batteries, 'react')
        working-directory: demo/frontend
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm test
          npm run build

  # Stable, requireable umbrella over the dynamic render matrix: the per-combo
  # `render (...)` job names vary by seed/strategy, so branch protection requires
  # this single context instead. Fails unless the whole matrix succeeded.
  render-complete:
    needs: [generate-matrix, render]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Gate on the full render matrix
        run: |
          echo "generate-matrix: ${{ needs.generate-matrix.result }}"
          echo "render:          ${{ needs.render.result }}"
          [ "${{ needs.generate-matrix.result }}" = "success" ] \
            && [ "${{ needs.render.result }}" = "success" ]
