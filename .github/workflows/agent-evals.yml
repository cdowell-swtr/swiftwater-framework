# Review-agent evals (framework design spec §20). Runs the golden fixtures through the real
# review agents and scores recall/precision per agent. Opt-in via the ANTHROPIC_FRAMEWORK_CI_EVAL
# repo secret (mapped into the ANTHROPIC_EVAL_API_KEY env var the CLI reads); --require-key makes a
# missing secret fail loudly rather than silently skip. Triggers: manual dispatch (the deliberate
# paid anchor — Slice E3), a weekly schedule, and any change to an agent prompt or the review logic.
name: agent-evals

on:
  # Manual trigger for the deliberate paid production-floor anchor (Slice E3): set the
  # ANTHROPIC_FRAMEWORK_CI_EVAL secret transiently, dispatch this workflow, then unset —
  # so a single paid run is fired on demand rather than on the next fixture/prompt push.
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  push:
    paths:
      - "src/framework_cli/review/agents/**"
      - "src/framework_cli/review/**.py"
      - "tests/eval/fixtures/**"
  pull_request:
    paths:
      - "src/framework_cli/review/agents/**"
      - "src/framework_cli/review/**.py"
      - "tests/eval/fixtures/**"

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv sync
      - name: run agent evals
        env:
          ANTHROPIC_EVAL_API_KEY: ${{ secrets.ANTHROPIC_FRAMEWORK_CI_EVAL }}
        # --require-key dropped post-Slice-E: calibration moved to local subagents
        # (/reviewers:tune). This CI job is now opt-in — set ANTHROPIC_FRAMEWORK_CI_EVAL
        # to enable a paid production-floor anchor run (Slice E3); unset = skip neutral.
        run: uv run framework eval --fixtures tests/eval/fixtures --backend api
