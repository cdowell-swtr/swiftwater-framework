name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      # the upskill tests shell out to `task` (go-task) on a rendered project.
      # Installed directly (not arduino/setup-task, which has no Node-24 release) —
      # see docs/maintenance/github-actions-node-runtime.md.
      - name: Install Task (go-task)
        run: |
          sh -c "$(curl -sSL https://taskfile.dev/install.sh)" -- -b "$HOME/.local/bin" v3.51.1
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pytest -q --ignore=tests/acceptance
      - run: uv lock --check
      - run: uv build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan repo for secrets
        run: gitleaks detect --source . --redact --no-banner
