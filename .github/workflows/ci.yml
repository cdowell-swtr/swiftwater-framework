name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      # the upskill tests shell out to `task` (go-task) on a rendered project.
      # Installed directly (not arduino/setup-task, which has no Node-24 release) —
      # see docs/maintenance/github-actions-node-runtime.md.
      - name: Install Task (go-task)
        run: |
          sh -c "$(curl -sSL https://taskfile.dev/install.sh)" -- -b "$HOME/.local/bin" v3.51.1
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      # The FAST tier (FWK96): the non-docker suite, sharded with pytest-xdist -n auto
      # (FWK93). Default --dist load (not loadscope): the long-pole
      # tests/test_copier_runner.py is one module, so loadscope would pin all its
      # functions to a single worker.
      # Ignore ONLY the two docker/dind acceptance files (not the whole dir) so the
      # non-docker tests/acceptance/test_conftest_disk_tmp.py unit test still runs here.
      # These run in the FULL tier (`task test:full`, branch-end) — a documented,
      # non-required exception enforced by tests/test_test_tiers.py.
      - run: uv run pytest -q -n auto --ignore=tests/acceptance/test_rendered_project.py --ignore=tests/acceptance/test_deploy_e2e.py --ignore=tests/acceptance/test_backup_drill.py
      - run: uv lock --check
      - run: uv build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan repo for secrets
        run: gitleaks detect --source . --redact --no-banner
