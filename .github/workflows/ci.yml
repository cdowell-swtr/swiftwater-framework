name: ci

on:
  pull_request:
  push:
    branches: [master]
  workflow_call:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      # the upskill tests shell out to `task` (go-task) on a rendered project
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pytest -q --ignore=tests/acceptance
      - run: uv lock --check
      - run: uv build
